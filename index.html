<!DOCTYPE html>
<html>
<head>
  <title>Park Ease</title>
  <style>
    body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #667eea, #764ba2);
  color: white;
}

/* Login Box */
#login {
  background: white;
  color: black;
  width: 300px;
  margin: 100px auto;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#login h2 {
  margin-bottom: 20px;
}

#login input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
}

#login button {
  width: 100%;
  padding: 10px;
  background: #667eea;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

#login button:hover {
  background: #5a67d8;
}

/* Parking slots */
.slot {
  width: 80px;
  height: 80px;
  background: green;
  margin: 10px;
  display: inline-block;
  line-height: 80px;
  color: white;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.3s;
}

.slot:hover {
  transform: scale(1.1);
}

.reserved {
  background: red;
}
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Enter Username"><br><br>
  <input type="password" id="password" placeholder="Enter Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- 🚗 MAIN APP -->
<div id="main" style="display:none;">
  <h1>🚗 Park Ease</h1>
  <p>Click a slot to reserve</p>
  <p id="count"></p>

  <div>
    <div class="slot" onclick="reserve(this)">P1</div>
    <div class="slot" onclick="reserve(this)">P2</div>
    <div class="slot" onclick="reserve(this)">P3</div>
    <div class="slot" onclick="reserve(this)">P4</div>
  </div>
</div>

<script>
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    updateCount();
  } else {
    alert("Invalid username or password");
  }
}

function updateCount() {
  let total = document.querySelectorAll('.slot').length;
  let reserved = document.querySelectorAll('.reserved').length;
  document.getElementById("count").innerText =
    "Available Slots: " + (total - reserved);
}

function reserve(slot) {
  if (!slot.classList.contains("reserved")) {
    slot.classList.add("reserved");
    alert("Slot Reserved!");
  } else {
    alert("Already Reserved!");
  }

  updateCount();
}
</script>

</body>
</html>
